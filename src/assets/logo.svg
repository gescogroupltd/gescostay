<svg width="225" height="110" viewBox="0 0 225 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Square Background: HSL styled terracotta/earthy brown color -->
  <rect x="5" y="10" width="90" height="90" rx="22" fill="#B27A5B"/>
  
  <!-- The 'g' Shape inside the square -->
  <g fill="#F5EDE6">
    <!-- Top head/circle profile of 'g' -->
    <path d="M50 25 C39 25, 33 31, 33 41 C33 50, 40 55, 50 55 C60 55, 67 50, 67 41 C67 31, 59 25, 50 25 Z" />
    <!-- Connector ear/branch on top right -->
    <path d="M64 26 C68 22, 74 22, 77 22 L77 30 C72 30, 68 31, 65 35 Z" />
    <!-- Center connecting neck link of the 'g' structure -->
    <path d="M50 52 C45 52, 41 55, 38 60 C37 62, 39 65, 43 65 C48 65, 52 61, 56 57 Z" />
    <!-- Lower loop/tail of 'g' -->
    <path d="M50 63 C33 63, 31 71, 31 78 C31 89, 40 95, 50 95 C62 95, 69 88, 69 78 C69 71, 63 63, 50 63 Z" />
    <!-- Inner counter space of the lower tail -->
    <path d="M50 71 C58 71, 60 76, 60 78 C60 83, 55 87, 50 87 C44 87, 40 83, 40 78 C40 76, 42 71, 50 71 Z" fill="#B27A5B" />
  </g>

  <!-- Smile and Eyes Detail (Dark Earth tone: #2C2218) -->
  <!-- Left Eye -->
  <circle cx="45" cy="38" r="2.2" fill="#2C2218" />
  <!-- Right Eye (Winking arc) -->
  <path d="M52.5 37 C54 35.5, 56 35.5, 57.5 37" stroke="#2C2218" stroke-width="1.8" stroke-linecap="round" fill="none" />
  <!-- Happy Smile Arc -->
  <path d="M39 46.5 C42 50.5, 52 50.5, 55 46.5" stroke="#2C2218" stroke-width="2.2" stroke-linecap="round" fill="none" />

  <!-- "stay" text wordmark -->
  <text x="110" y="70" font-family="'Inter', system-ui, sans-serif" font-size="52" font-weight="600" fill="#2C2218" letter-spacing="-0.03em">stay</text>
</svg>
